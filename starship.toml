"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
right_format = """$git_metrics$memory_usage$time"""

[battery]
charging_symbol = 'пғ§ '
discharging_symbol = 'у°ӮҒ '

[[battery.display]]
threshold = 40
style = "bold #f38ba8" # Red

[character]
# UЕјyto Red i Green z palety Mocha
error_symbol = "[вң–](#f38ba8) " 
success_symbol = "[вқҜ](#a6e3a1)" 

[cmd_duration]
format = " took [$duration]($style)"
min_time = 10
style = "bold #f9e2af" # Yellow

[directory]
truncation_length = 3
read_only = "пҖЈ "
# Blue dla ЕӣcieЕјki
format = "[$path](#89b4fa)[$lock_symbol]($lock_style) "

[git_branch]
format = " [$symbol$branch]($style) "
symbol = "оӮ  "
style = "#fab387" # Peach (zamiast starego pomaraЕ„czowego)

[git_commit]
commit_hash_length = 8
style = "#cdd6f4" # Text (zamiast bright white)

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
disabled = true

[git_status]
conflicted = "вҡ”пёҸ "
ahead = "вҮЎ Г—${count} "
behind = "вҮЈ Г—${count} "
diverged = "вҮ• Г—${ahead_count} п„Ү Г—${behind_count} "
untracked = "п„Ё Г—${count} "
stashed = " рҹ“Ұ "
modified = "! Г—${count} "
staged = "пҒ§ Г—${count} "
renamed = "п„Ғ Г—${count} "
deleted = "вңҳ Г—${count} "
style = "#cdd6f4" # Text
format = "$all_status$ahead_behind"
disabled = true

[git_metrics]
disabled = true

[hostname]
ssh_only = false
format = " [$hostname]($style) "
trim_at = "-"
style = "#cba6f7" # Mauve (zamiast starego fioletu)
disabled = true

[memory_usage]
format = "$symbol[${ram}(  )]($style) "
threshold = 0
symbol = " пӢӣ "
style = "#89b4fa" # Blue
disabled = false

[username]
disabled = true
style_user = "#a6e3a1" # Green
format = "[$user]($style) @"
show_always = true

[time]
disabled = false
format = '[\[ $time \]]($style) '
time_format = '%I:%M %p'
style = "#bac2de" # Subtext1

[package]
disabled = true

[aws]
symbol = "пғҜ  "
style = "#fab387" # Peach

