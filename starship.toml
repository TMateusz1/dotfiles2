# ~/.config/starship.toml

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$golang\
$python\
$docker_context\
$helm\
$line_break\
$jobs\
$character"""

# Transient info on the right edge; keeps the left prompt clean.
right_format = "$cmd_duration"

palette = "catppuccin_mocha"


# ----------------------------
# Prompt character
# ----------------------------

[character]
success_symbol = "[‚ĚĮ](green)"
error_symbol = "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](mauve)"


# ----------------------------
# Directory
# ----------------------------

[directory]
style = "bold lavender"
truncation_length = 3
truncate_to_repo = true
read_only = " ÔÄ£"
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "


# ----------------------------
# Git
# ----------------------------

[git_branch]
symbol = "Ôźė "
style = "mauve"
format = "[$symbol$branch]($style) "

# Rebase/merge/cherry-pick progress (e.g. "REBASING 2/5"). Reads .git state
# files only ‚ÄĒ no subprocess, effectively free.
[git_state]
style = "bold peach"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
style = "yellow"
format = "[$all_status$ahead_behind]($style) "
conflicted = "=${count} "
ahead = "‚á°${count} "
behind = "‚á£${count} "
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "¬Ľ${count} "
deleted = "‚úė${count} "


# ----------------------------
# Languages / tools
# ----------------------------

[golang]
symbol = "Óėß "
style = "sapphire"
format = "[$symbol]($style) "

[python]
symbol = "ÓąĶ "
style = "yellow"
format = "[$symbol$version]($style) "
python_binary = ["python3", "python"]

[docker_context]
symbol = "ÔĆą "
style = "blue"
format = "[$symbol$context]($style) "
disabled = true
only_with_files = true
detect_files = [
  "docker-compose.yml",
  "docker-compose.yaml",
  "compose.yml",
  "compose.yaml",
  "Dockerfile"
]

# Symbol only: rendering $version would exec `helm version` on every prompt
# in chart directories (~700 ms measured) ‚ÄĒ symbol-only skips the subprocess.
[helm]
symbol = "‚éą "
style = "teal"
format = "[$symbol]($style) "


# ----------------------------
# Kubernetes
# ----------------------------
# WyŇāńÖczone celowo, Ňľeby nie pokazywańá context/namespace.
# K8s i tak obsŇāugujesz przez kubectl/k9s/kubectx, a prompt zostaje czysty.

[kubernetes]
disabled = true


# ----------------------------
# Command duration
# ----------------------------

[cmd_duration]
min_time = 1500
style = "overlay1"
format = "took [$duration]($style) "

# Background job count next to the prompt character (e.g. after Ctrl-Z).
[jobs]
symbol = "‚ú¶ "
style = "sky"
format = "[$symbol$number]($style) "


# ----------------------------
# Modules worth disabling
# ----------------------------

[package]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[java]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[terraform]
disabled = true

[username]
disabled = true

[hostname]
disabled = true


# ----------------------------
# Catppuccin Mocha palette
# ----------------------------

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
