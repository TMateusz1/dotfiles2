# ~/.config/starship.toml

add_newline = true
command_timeout = 500
scan_timeout = 10

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$golang\
$python\
$nodejs\
$helm\
$line_break\
$jobs\
$character"""

# Transient info on the right edge; keeps the left prompt clean.
right_format = "$cmd_duration"

palette = "catppuccin_mocha"


# ----------------------------
# Prompt character
# ----------------------------

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](blue)"


# ----------------------------
# Directory
# ----------------------------

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = " "
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "


# ----------------------------
# Git
# ----------------------------

[git_branch]
symbol = " "
style = "blue"
format = "[$symbol$branch]($style) "

# Rebase/merge/cherry-pick progress (e.g. "REBASING 2/5"). Reads .git state
# files only — no subprocess, effectively free.
[git_state]
style = "bold peach"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
style = "yellow"
format = "[$all_status$ahead_behind]($style) "
conflicted = "=${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "


# ----------------------------
# Languages / tools
#
# $version shows the active toolchain — go/node/python version calls are
# ~20-80 ms, fast enough per prompt. helm below stays symbol-only (~700 ms).
# ----------------------------

[golang]
symbol = " "
style = "sapphire"
format = "[$symbol($version )]($style) "

[python]
symbol = " "
style = "yellow"
format = "[$symbol($version )]($style) "
python_binary = ["python3"]

[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version )]($style) "

# Symbol only: rendering $version would exec `helm version` on every prompt
# in chart directories (~700 ms measured) — symbol-only skips the subprocess.
[helm]
symbol = "⎈ "
style = "blue"
format = "[$symbol]($style) "


# ----------------------------
# Command duration
# ----------------------------

[cmd_duration]
min_time = 1500
style = "overlay1"
format = "took [$duration]($style) "

# Background job count next to the prompt character (e.g. after Ctrl-Z).
[jobs]
symbol = "✦ "
style = "sky"
format = "[$symbol$number]($style) "


# ----------------------------
# Catppuccin Mocha palette
# ----------------------------

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
cyan = "#89dceb"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
