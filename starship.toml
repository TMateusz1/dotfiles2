# ~/.config/starship.toml

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$golang\
$python\
$docker_context\
$helm\
$cmd_duration\
$line_break\
$character"""

palette = "catppuccin_mocha"


# ----------------------------
# Prompt character
# ----------------------------

[character]
success_symbol = "[‚ùØ](green)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](mauve)"


# ----------------------------
# Directory
# ----------------------------

[directory]
style = "bold lavender"
truncation_length = 3
truncate_to_repo = true
read_only = " ÔÄ£"
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "


# ----------------------------
# Git
# ----------------------------

[git_branch]
symbol = "Ôêò "
style = "mauve"
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "[$all_status$ahead_behind]($style) "
conflicted = "=${count} "
ahead = "‚á°${count} "
behind = "‚á£${count} "
diverged = "‚áï‚á°${ahead_count}‚á£${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "¬ª${count} "
deleted = "‚úò${count} "


# ----------------------------
# Languages / tools
# ----------------------------

[golang]
symbol = "Óòß "
style = "sapphire"
format = "[$symbol]($style) "

[python]
symbol = "Óàµ "
style = "yellow"
format = "[$symbol$version]($style) "
pyenv_version_name = true
python_binary = ["python3", "python"]

[docker_context]
symbol = "Ôåà "
style = "blue"
format = "[$symbol$context]($style) "
disabled = true
only_with_files = true
detect_files = [
  "docker-compose.yml",
  "docker-compose.yaml",
  "compose.yml",
  "compose.yaml",
  "Dockerfile"
]

[helm]
symbol = "‚éà "
style = "teal"
format = "[$symbol$version]($style) "


# ----------------------------
# Kubernetes
# ----------------------------
# Wy≈ÇƒÖczone celowo, ≈ºeby nie pokazywaƒá context/namespace.
# K8s i tak obs≈Çugujesz przez kubectl/k9s/kubectx, a prompt zostaje czysty.

[kubernetes]
disabled = true


# ----------------------------
# Command duration
# ----------------------------

[cmd_duration]
min_time = 1500
style = "overlay1"
format = "took [$duration]($style) "


# ----------------------------
# Modules worth disabling
# ----------------------------

[package]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[java]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[terraform]
disabled = true

[username]
disabled = true

[hostname]
disabled = true


# ----------------------------
# Catppuccin Mocha palette
# ----------------------------

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
