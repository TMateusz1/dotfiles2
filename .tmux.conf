# ~/.tmux.conf

# ------------------------------------------------------------
# Prefix
# ------------------------------------------------------------

set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"


# ------------------------------------------------------------
# Terminal / colors
# ------------------------------------------------------------

# Use tmux terminfo inside tmux.
# Avoid setting xterm-ghostty explicitly, because it can break SSH/Linux hosts
# when remote systems do not know that terminal type.
set -g default-terminal "tmux-256color"

# True color support for common xterm-compatible terminals.
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -sa terminal-overrides ",xterm-256color:RGB"

# Forward modified keys such as Shift-Enter to TUI apps.
set -s extended-keys always
set -s extended-keys-format csi-u

# Pass terminal focus events through to applications. Neovim relies on
# FocusGained to reload files changed on disk (lazygit popup, go generate).
set -g focus-events on

# Let Neovim's 'title' option set the terminal window title through tmux.
set -g set-titles on
set -g set-titles-string "#T"


# ------------------------------------------------------------
# Clipboard / mouse / history
# ------------------------------------------------------------

set -g set-clipboard on
set -g terminal-features[3] 'xterm-ghostty:clipboard:extkeys'
set -g terminal-features[4] 'xterm-256color:clipboard'
set -g terminal-features[5] 'tmux-256color:clipboard'



set -g mouse on
set -g history-limit 100000

# Faster escape timing, better for Neovim
set -sg escape-time 10


# ------------------------------------------------------------
# Indexing
# ------------------------------------------------------------

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on


# ------------------------------------------------------------
# Splits / windows
# ------------------------------------------------------------

# Split in current pane directory
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current pane directory
bind c new-window -c "#{pane_current_path}"

# Window picker: only windows of the current (attached) session
bind w choose-tree -Zw -f "#{==:#{session_attached},1}"

# Roll between windows: press prefix once, then C-[ / C-] repeatedly
set -g repeat-time 1000
bind -r C-[ previous-window
bind -r C-] next-window


# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ------------------------------------------------------------
# Smart pane switching with Neovim awareness
# ------------------------------------------------------------

# If current pane is running Vim/Neovim/fzf, send pane-navigation keys to it.
# Otherwise, move between tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -n C-Left if-shell "$is_vim" "send-keys C-Left" "select-pane -L"
bind-key -n C-Down if-shell "$is_vim" "send-keys C-Down" "select-pane -D"
bind-key -n C-Up if-shell "$is_vim" "send-keys C-Up" "select-pane -U"
bind-key -n C-Right if-shell "$is_vim" "send-keys C-Right" "select-pane -R"

# LazyGit popup in current directory
bind -r g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E lazygit


# ------------------------------------------------------------
# Copy mode
# ------------------------------------------------------------

setw -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel


# ------------------------------------------------------------
# Statusline — Catppuccin Mocha, styled after the lualine setup
# ------------------------------------------------------------

# Mocha palette (same flavour as nvim + ghostty).
# Static styles use these via -gF; the format strings below inline the hex
# values because -gF would also expand runtime conditionals at load time.
set -g @ctp_base "#1e1e2e"
set -g @ctp_mantle "#181825"
set -g @ctp_crust "#11111b"
set -g @ctp_surface0 "#313244"
set -g @ctp_surface1 "#45475a"
set -g @ctp_surface2 "#585b70"
set -g @ctp_overlay0 "#6c7086"
set -g @ctp_subtext0 "#a6adc8"
set -g @ctp_text "#cdd6f4"
set -g @ctp_blue "#89b4fa"
set -g @ctp_mauve "#cba6f7"
set -g @ctp_lavender "#b4befe"
set -g @ctp_peach "#fab387"
set -g @ctp_yellow "#f9e2af"

set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 100

set -gF status-style "bg=#{@ctp_base},fg=#{@ctp_text}"

# Session block: blue like lualine's normal mode, peach while the prefix is
# active so there's visible feedback after C-Space. Rounded caps on both
# sides, name centered.
set -g status-left "#{?client_prefix,#[fg=#fab387],#[fg=#89b4fa]}#[bg=#1e1e2e]#{?client_prefix,#[fg=#11111b]#[bg=#fab387],#[fg=#11111b]#[bg=#89b4fa]}#[bold] #S #{?client_prefix,#[fg=#fab387],#[fg=#89b4fa]}#[bg=#1e1e2e]#[default] "

# Right side: current pane directory as plain text, time/date in a fully
# rounded accent block.
set -g status-right "#[fg=#a6adc8]󰉋 #{b:pane_current_path}  #[fg=#89b4fa,bg=#1e1e2e]#[fg=#11111b,bg=#89b4fa,bold] 󰥔 %H:%M  %d/%m/%Y #[fg=#89b4fa,bg=#1e1e2e]#[default]"

# Windows: dim inactive, current one outlined in white (same bg as the bar),
# zoom indicator when a pane is zoomed.
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#a6adc8,bg=#1e1e2e]  #I #W#{?window_zoomed_flag, 󰍉,} "
setw -g window-status-current-format "#[fg=#cdd6f4,bg=#1e1e2e]#[bold]#I #W#{?window_zoomed_flag, 󰍉,}#[nobold]#[default]"

# Flag windows with activity instead of popping a message.
setw -g monitor-activity on
set -g visual-activity off
setw -gF window-status-activity-style "fg=#{@ctp_yellow},bg=#{@ctp_base}"

# Panes keep the default terminal background (ghostty translucency applies
# everywhere); the active pane is marked by a light gray border instead.
set -g pane-border-lines single
set -g pane-border-indicators colour
set -gF pane-border-style "fg=#{@ctp_surface0}"
set -gF pane-active-border-style "fg=#{@ctp_subtext0}"

# Popups (lazygit, windowizer): rounded borders like nvim's floating windows.
set -g popup-border-lines rounded
set -gF popup-border-style "fg=#{@ctp_blue}"
set -gF popup-style "bg=#{@ctp_base}"

# Pane number overlay (prefix q).
set -gF display-panes-colour "#{@ctp_surface2}"
set -gF display-panes-active-colour "#{@ctp_blue}"
set -gF message-style "fg=#{@ctp_text},bg=#{@ctp_surface0}"
set -gF message-command-style "fg=#{@ctp_text},bg=#{@ctp_surface0}"
set -gF mode-style "fg=#{@ctp_text},bg=#{@ctp_surface1}"
set -gF copy-mode-match-style "fg=#{@ctp_crust},bg=#{@ctp_yellow}"
set -gF copy-mode-current-match-style "fg=#{@ctp_crust},bg=#{@ctp_peach}"
set -gF clock-mode-colour "#{@ctp_blue}"
