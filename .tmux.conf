# ~/.tmux.conf

# ------------------------------------------------------------
# Prefix
# ------------------------------------------------------------

set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"


# ------------------------------------------------------------
# Terminal / colors
# ------------------------------------------------------------

# Use tmux terminfo inside tmux.
# Avoid setting xterm-ghostty explicitly, because it can break SSH/Linux hosts
# when remote systems do not know that terminal type.
set -g default-terminal "tmux-256color"

# True color support for common xterm-compatible terminals.
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -sa terminal-overrides ",xterm-256color:RGB"

# Forward modified keys such as Shift-Enter to TUI apps.
set -s extended-keys always
set -s extended-keys-format csi-u

# Pass terminal focus events through to applications. Neovim relies on
# FocusGained to reload files changed on disk (lazygit popup, go generate).
set -g focus-events on

# Let Neovim's 'title' option set the terminal window title through tmux.
set -g set-titles on
set -g set-titles-string "#T"


# ------------------------------------------------------------
# Clipboard / mouse / history
# ------------------------------------------------------------

set -g set-clipboard on
set -g terminal-features[3] 'xterm-ghostty:clipboard:extkeys'
set -g terminal-features[4] 'xterm-256color:clipboard'
set -g terminal-features[5] 'tmux-256color:clipboard'



set -g mouse on
set -g history-limit 100000

# Faster escape timing, better for Neovim
set -sg escape-time 10


# ------------------------------------------------------------
# Indexing
# ------------------------------------------------------------

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on


# ------------------------------------------------------------
# Splits / windows
# ------------------------------------------------------------

# Split in current pane directory
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current pane directory
bind c new-window -c "#{pane_current_path}"


# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ------------------------------------------------------------
# Smart pane switching with Neovim awareness
# ------------------------------------------------------------

# If current pane is running Vim/Neovim/fzf, send pane-navigation keys to it.
# Otherwise, move between tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -n C-Left if-shell "$is_vim" "send-keys C-Left" "select-pane -L"
bind-key -n C-Down if-shell "$is_vim" "send-keys C-Down" "select-pane -D"
bind-key -n C-Up if-shell "$is_vim" "send-keys C-Up" "select-pane -U"
bind-key -n C-Right if-shell "$is_vim" "send-keys C-Right" "select-pane -R"


# ------------------------------------------------------------
# Session / project helpers
# ------------------------------------------------------------

# New tmux window with your sessionizer
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Windowizer popup
bind-key w display-popup -E "tmux-windowizer"

# LazyGit popup in current directory
bind -r g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E lazygit


# ------------------------------------------------------------
# Copy mode
# ------------------------------------------------------------

setw -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel


# ------------------------------------------------------------
# Statusline — simple Catppuccin-like manual colors
# ------------------------------------------------------------

set -g @ctp_bg "#24273a"
set -g @ctp_surface_1 "#494d64"
set -g @ctp_fg "#cad3f5"
set -g @ctp_mauve "#c6a0f6"
set -g @ctp_crust "#181926"

set -gF status-style "bg=#{@ctp_bg},fg=#{@ctp_fg}"

set -g status-left-length 40
set -g status-right-length 80

set -g status-left " #S "
set -g status-right " %Y-%m-%d %H:%M "

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[fg=#{@ctp_bg},bg=#{@ctp_mauve},bold] #I:#W #[default]"

setw -g window-status-style "fg=#{@ctp_fg},bg=#{@ctp_bg}"
setw -g window-status-current-style "fg=#{@ctp_bg},bg=#{@ctp_mauve},bold"
